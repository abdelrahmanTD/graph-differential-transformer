model:
  hidden_dim: 768
  num_heads: 12
  num_layers: 12
  ffn_dim: 3072
  patch_size: 16
  img_size: 224
  max_seq_len: 512
  vocab_size: 30522
  num_edge_types: 8
  alpha: 0.5
  dropout: 0.1
  num_object_queries: 100

training:
  lr: 1.0e-4
  min_lr: 1.0e-5
  weight_decay: 0.01
  batch_size: 256
  warmup_steps: 10000
  max_grad_norm: 1.0
  w_align: 1.0
  w_mlm: 0.5
  w_mim: 0.5
  w_graph: 0.3
  temperature: 0.07
  mlm_mask_ratio: 0.15
  mim_mask_ratio: 0.75

run:
  primary_task: vqa
  epochs: 15
  lr: 1.0e-5
  checkpoint_dir: checkpoints
  data_root: data
  num_vqa_answers: 3129
  num_coco_classes: 91
  beam_size: 5
